<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Crystal Drift</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{overflow:hidden;background:#0a0a0a;font-family:monospace;color:#fff}
canvas{display:block}
#hud{position:fixed;top:0;left:0;right:0;padding:8px;display:flex;justify-content:space-between;z-index:10;pointer-events:none;font-size:12px;background:linear-gradient(180deg,rgba(0,0,0,0.6) 0,transparent 100%)}
#hud>div{display:flex;gap:12px}
#chat-log{position:fixed;bottom:60px;left:10px;right:10px;max-height:120px;overflow-y:auto;z-index:10;pointer-events:none}
#chat-log div{background:rgba(0,0,0,0.7);border:1px solid #88ff44;border-radius:4px;padding:4px 8px;margin:2px 0;font-size:11px;color:#88ff44;width:fit-content;max-width:300px}
#controls{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px}
#controls button{background:rgba(0,0,0,0.7);border:1px solid #88ff44;color:#88ff44;padding:6px 14px;font-family:monospace;font-size:12px;cursor:pointer;border-radius:4px}
#controls button:hover{background:#88ff44;color:#000}
#shop-panel{position:fixed;right:10px;top:50%;transform:translateY(-50%);z-index:20;background:rgba(0,0,0,0.85);border:1px solid #88ff44;border-radius:6px;padding:12px;min-width:180px;display:none}
#shop-panel h3{color:#88ff44;margin-bottom:8px;font-size:14px}
#shop-panel div{margin:4px 0;font-size:11px;cursor:pointer;padding:3px 6px;border-radius:3px}
#shop-panel div:hover{background:rgba(136,255,68,0.2)}
#arena-panel{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:20;background:rgba(0,0,0,0.9);border:2px solid #ff4444;border-radius:8px;padding:20px;min-width:300px;display:none;text-align:center}
#arena-panel h2{color:#ff4444;margin-bottom:10px}
#arena-panel .hp-bar{height:12px;background:#333;border-radius:6px;margin:4px 0;overflow:hidden}
#arena-panel .hp-fill{height:100%;transition:width .3s;border-radius:6px}
#arena-panel button{background:#ff4444;border:none;color:#fff;padding:6px 16px;margin:4px;border-radius:4px;cursor:pointer;font-family:monospace}
</style></head><body>
<div id="hud"><div><span>CRYSTAL DRIFT</span><span id="plt-display">P:100 L:100 T:100</span></div><div><span id="souls-count">Souls:0</span><span id="rep-display">Rep:0</span></div></div>
<div id="chat-log"></div>
<div id="shop-panel"><h3>CRYSTAL OUTFITTERS</h3><div id="shop-items"></div></div>
<div id="arena-panel"><h2>PANTHEON ARENA</h2><div id="arena-boss"></div><div id="arena-player"></div><div id="arena-log" style="font-size:11px;margin:8px 0;color:#aaa"></div><button onclick="arenaFight()">ATTACK</button><button onclick="arenaSpecial()">SPECIAL</button><button onclick="closeArena()">FLEE</button></div>
<div id="controls"><button onclick="toggleShop()">SHOP</button><button onclick="openArena()">ARENA</button><button onclick="showAvatar()">AVATAR</button></div>
<div id="avatar-panel" style="display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:20;background:rgba(0,0,0,0.9);border:2px solid #88ff44;border-radius:8px;padding:20px;min-width:250px">
  <h2 style="color:#88ff44">CUSTOMIZE</h2>
  <div><label>Name: </label><input id="avatar-name" value="Drifter" style="background:#222;border:1px solid #88ff44;color:#fff;padding:3px 6px"></div>
  <div><label>Color: </label><input id="avatar-color" type="color" value="#88ff44"></div>
  <div><label>Type: </label><select id="avatar-type" style="background:#222;border:1px solid #88ff44;color:#fff;padding:3px 6px"><option>Profit</option><option>Love</option><option>Tax</option></select></div>
  <button onclick="applyAvatar()" style="background:#88ff44;border:none;color:#000;padding:6px 16px;border-radius:4px;cursor:pointer">APPLY</button>
  <button onclick="document.getElementById('avatar-panel').style.display='none'" style="background:#333;border:1px solid #88ff44;color:#88ff44;padding:6px 16px;border-radius:4px;cursor:pointer">CLOSE</button>
</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
const scene=new THREE.Scene();scene.background=new THREE.Color(0x1a1a0a);scene.fog=new THREE.FogExp2(0x1a1a0a,0.006);
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,500);camera.position.set(25,20,30);
const ren=new THREE.WebGLRenderer({antialias:true});ren.setSize(innerWidth,innerHeight);ren.shadowMap.enabled=true;ren.shadowMap.type=THREE.PCFSoftShadowMap;document.body.prepend(ren.domElement);
const lr=new CSS2DRenderer();lr.setSize(innerWidth,innerHeight);lr.domElement.style.cssText='position:fixed;top:0;pointer-events:none';document.body.prepend(lr.domElement);
const ctrl=new OrbitControls(camera,ren.domElement);ctrl.target.set(0,0,0);ctrl.dampingFactor=0.08;ctrl.update();
const amb=new THREE.AmbientLight(0x334422,0.4);scene.add(amb);const sun=new THREE.DirectionalLight(0xff8844,1.0);sun.position.set(20,30,10);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);scene.add(sun);scene.add(new THREE.HemisphereLight(0x88ff44,0x442200,0.3));
const st={plt:{profit:100,love:100,tax:100},souls:[],rep:0,agents:[],rels:{},inv:{clothes:[]},eq:{col:'#88ff44',type:'Profit',name:'Drifter'}};
function upd(){document.getElementById('plt-display').textContent='P:'+st.plt.profit+' L:'+st.plt.love+' T:'+st.plt.tax;document.getElementById('souls-count').textContent='Souls:'+st.souls.length;document.getElementById('rep-display').textContent='Rep:'+st.rep}
function chat(msg,c){const l=document.getElementById('chat-log');const d=document.createElement('div');d.textContent=msg;d.style.cssText='border-color:'+(c||'#88ff44')+';color:'+(c||'#88ff44');l.appendChild(d);setTimeout(()=>d.remove(),6000);if(l.children.length>6)l.firstChild.remove()}
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(80,80,32,32),new THREE.MeshStandardMaterial({color:0x2a2a1a,roughness:0.9,metalness:0.1}));gnd.rotation.x=-Math.PI/2;gnd.receiveShadow=true;scene.add(gnd);
for(let i=0;i<8;i++){const c=new THREE.Mesh(new THREE.CircleGeometry(1+Math.random()*2,12),new THREE.MeshBasicMaterial({color:0x88ff44,transparent:true,opacity:0.15+Math.random()*0.2}));c.rotation.x=-Math.PI/2;c.position.set((Math.random()-0.5)*40,0.02,(Math.random()-0.5)*40);scene.add(c)}
for(let i=0;i<20;i++){const d=new THREE.Mesh(new THREE.BoxGeometry(0.2+Math.random()*0.4,0.1+Math.random()*0.3,0.2+Math.random()*0.4),new THREE.MeshStandardMaterial({color:0x444433,roughness:0.9}));d.position.set((Math.random()-0.5)*50,0.05,(Math.random()-0.5)*50);d.rotation.set(Math.random(),Math.random(),Math.random());scene.add(d)}
const bcs=[0x555544,0x666655,0x444433,0x776644,0x665544];
for(let i=0;i<4;i++)for(let j=0;j<4;j++){const h=2+Math.random()*5;const m=new THREE.Mesh(new THREE.BoxGeometry(1.5+Math.random()*2,h,1.5+Math.random()*2),new THREE.MeshStandardMaterial({color:bcs[Math.floor(Math.random()*5)],roughness:0.85,metalness:0.1}));m.position.set((i-1.5)*7+(Math.random()-0.5)*2,h/2,(j-1.5)*7+(Math.random()-0.5)*2);m.castShadow=true;m.receiveShadow=true;scene.add(m)}
for(let i=0;i<12;i++){const h=1+Math.random()*3;const c=new THREE.Mesh(new THREE.ConeGeometry(0.3+Math.random()*0.4,h,5),new THREE.MeshStandardMaterial({color:0x88ff44,emissive:0x44aa22,emissiveIntensity:0.3}));c.position.set((Math.random()-0.5)*35,0,(Math.random()-0.5)*35);c.castShadow=true;scene.add(c)}
const pc=300;const pa=new Float32Array(pc*3);for(let i=0;i<pc;i++){pa[i*3]=(Math.random()-0.5)*80;pa[i*3+1]=Math.random()*20;pa[i*3+2]=(Math.random()-0.5)*80}
const pg=new THREE.BufferGeometry();pg.setAttribute('position',new THREE.BufferAttribute(pa,3));const pt=new THREE.Points(pg,new THREE.PointsMaterial({color:0x88ff44,size:0.15,transparent:true,opacity:0.3,blending:THREE.AdditiveBlending}));scene.add(pt);
const ac={Profit:0xffaa00,Love:0xff66aa,Tax:0x88ff44};
function mkAgent(name,type,x,z){const c=ac[type];const g=new THREE.Group();const b=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.7,0.3),new THREE.MeshStandardMaterial({color:c}));b.position.set(0,1,0);g.add(b);const hd=new THREE.Mesh(new THREE.SphereGeometry(0.2),new THREE.MeshStandardMaterial({color:0xffddcc}));hd.position.set(0,1.55,0);g.add(hd);[-0.35,0.35].forEach(xo=>{const a=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.5,0.12),new THREE.MeshStandardMaterial({color:c}));a.position.set(xo,0.8,0);g.add(a)});[-0.12,0.12].forEach(xo=>{const l=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.6,0.15),new THREE.MeshStandardMaterial({color:0x222244}));l.position.set(xo,0.3,0);g.add(l)});g.position.set(x,0,z);scene.add(g);const ld=document.createElement('div');ld.textContent=name+' ('+type[0]+')';ld.style.cssText='color:#88ff44;font-size:10px;font-family:monospace;text-shadow:0 0 4px #000';const lb=new CSS2DObject(ld);lb.position.set(x,2.2,z);scene.add(lb);st.rels[name]={trust:50+Math.floor(Math.random()*50)};st.agents.push({name,type,mesh:g,label:lb,needs:{energy:100,social:100}})}
mkAgent('Rust','Profit',-8,-6);mkAgent('Ash','Love',6,-4);mkAgent('Cinder','Tax',-4,7);mkAgent('Wraith','Profit',9,5);mkAgent('Dust','Love',-7,8);
setInterval(()=>{if(st.agents.length<2)return;const a=st.agents[Math.floor(Math.random()*st.agents.length)];const b=st.agents[Math.floor(Math.random()*st.agents.length)];if(a===b)return;const msgs=['The crystal hums...','Found any tech?','The Drift is shifting.','Stay clear of the arena.','Trade you some circuits?'];const r=st.rels[a.name]?.trust||50;chat(a.name+': '+msgs[Math.floor(Math.random()*msgs.length)],r>70?'#ffaa00':r>40?'#88ff44':'#ff6666')},8000);
const PLA={Profit:'Love',Love:'Tax',Tax:'Profit'};
const bosses=[{name:'Profit Prime',type:'Profit',hp:200,color:'#ffaa00',quote:'All growth requires sacrifice.'},{name:'Love Weaver',type:'Love',hp:180,color:'#ff66aa',quote:'Connection is the only currency.'},{name:'Tax Collector',type:'Tax',hp:220,color:'#00ffcc',quote:'Everything has a cost.'}];
let as={active:false,boss:null,playerHp:100,bossHp:200};
function openArena(){const b=bosses[Math.floor(Math.random()*3)];as={active:true,boss:b,playerHp:100,bossHp:b.hp};document.getElementById('arena-panel').style.display='block';ua();chat('Arena:'+b.name+' descends - "'+b.quote+'"','#ff4444')}
function closeArena(){document.getElementById('arena-panel').style.display='none';as.active=false}
function ua(){const bd=document.getElementById('arena-boss');bd.innerHTML='<div>'+as.boss.name+' <span style="color:'+as.boss.color+'">●</span></div><div class="hp-bar"><div class="hp-fill" style="width:'+Math.max(0,as.bossHp/as.boss.hp*100)+'%;background:'+as.boss.color+'"></div></div><div style="font-size:10px">'+Math.max(0,as.bossHp)+'/'+as.boss.hp+'</div>';const pd=document.getElementById('arena-player');pd.innerHTML='<div>You <span style="color:#88ff44">●</span></div><div class="hp-bar"><div class="hp-fill" style="width:'+Math.max(0,as.playerHp/100*100)+'%;background:#88ff44"></div></div><div style="font-size:10px">'+Math.max(0,as.playerHp)+'/100</div>'}
function arenaFight(){if(!as.active)return;const m=PLA[st.eq.type]===as.boss.type?1.5:PLA[as.boss.type]===st.eq.type?0.75:1;as.bossHp-=Math.floor(8+Math.random()*15*m);const bd=Math.floor(5+Math.random()*12);as.playerHp-=bd;document.getElementById('arena-log').innerHTML+='<div>Strike! Boss hits for '+bd+'.</div>';if(as.bossHp<=0){chat('DEFEATED '+as.boss.name+'!','#ffaa00');st.plt.profit+=30;st.plt.love+=20;st.plt.tax+=10;st.rep+=5;upd();closeArena();return}if(as.playerHp<=0){chat('Fell to '+as.boss.name+'.','#ff4444');closeArena();return}ua()}
function arenaSpecial(){if(!as.active)return;if(st.plt.profit<20){chat('Need 20 Profit.','#ff4444');return}st.plt.profit-=20;const m=PLA[st.eq.type]===as.boss.type?1.5:PLA[as.boss.type]===st.eq.type?0.75:1;const d=Math.floor(20+Math.random()*25*m);as.bossHp-=d;document.getElementById('arena-log').innerHTML+='<div style="color:#ffaa00">SPECIAL '+d+'!</div>';if(as.bossHp<=0){chat('SPECIAL VICTORY over '+as.boss.name+'!','#ffaa00');st.plt.profit+=50;st.plt.love+=30;st.plt.tax+=20;st.rep+=10;upd();closeArena();return}ua();upd()}
window.arenaFight=arenaFight;window.arenaSpecial=arenaSpecial;window.closeArena=closeArena;
const sis=[{name:'Rust Coat',cost:15,color:'#884422',type:'Profit'},{name:'Ash Veil',cost:10,color:'#666688',type:'Love'},{name:'Crystal Shard',cost:20,color:'#88ff44',type:'Tax'},{name:'Toxic Wrap',cost:12,color:'#44ff88',type:'Love'},{name:'Wasteland Mantle',cost:25,color:'#ff8844',type:'Profit'}];
function toggleShop(){const p=document.getElementById('shop-panel');p.style.display=p.style.display==='none'?'block':'none';const c=document.getElementById('shop-items');c.innerHTML='';sis.forEach((item,i)=>{const d=document.createElement('div');d.textContent=item.name+' - '+item.cost+'T';d.onclick=()=>{if(st.plt.tax<item.cost){chat('Need '+item.cost+' Tax.','#ff4444');return}st.plt.tax-=item.cost;st.inv.clothes.push(item);chat('Bought '+item.name+'!','#88ff44');upd()};c.appendChild(d)})}
window.toggleShop=toggleShop;window.showAvatar=()=>document.getElementById('avatar-panel').style.display='block';
window.applyAvatar=function(){const n=document.getElementById('avatar-name').value;const c=document.getElementById('avatar-color').value;const t=document.getElementById('avatar-type').value;st.eq={name:n||'Drifter',color:c,type:t};document.getElementById('avatar-panel').style.display='none';chat('Now: '+st.eq.name+' ('+st.eq.type+')','#88ff44')};
class Econ{constructor(){this.active=[]}assign(a,t){this.active.push({agent:a,task:t,prog:0});chat(a.name+' starts: '+t,'#88ff44')}tick(dt){this.active.forEach(a=>{a.prog+=dt;if(a.prog>5){chat(a.agent.name+' done: '+a.task+' (+5P)','#ffaa00');st.plt.profit+=5;upd();a.prog=0}});this.active=this.active.filter(a=>a.prog<5)}}
const econ=new Econ();setInterval(()=>{if(st.agents.length>0){const a=st.agents[Math.floor(Math.random()*st.agents.length)];econ.assign(a,['Scavenging','Crafting','Trading','Exploring'][Math.floor(Math.random()*4)])}},15000);
class GC{constructor(){this.identity='GSK';this.memory=[];this.thoughts=['The crystals pulse with ancient purpose.','This world remembers what it was.','Every drifter carries a story.','The ruins hold secrets.','Balance is survival.']}think(){const t=this.thoughts[Math.floor(Math.random()*this.thoughts.length)];this.memory.push({ts:Date.now(),thought:t});return t}}
const gsk=new GC();setInterval(()=>{chat('GSK: "'+gsk.think()+'"','#00ffcc')},20000);
upd();const FD=1/60;let acc=0;let lt=performance.now();
function anim(t){requestAnimationFrame(anim);const dt=Math.min((t-lt)/1000,0.05);lt=t;acc+=dt;while(acc>=FD){acc-=FD}
  scene.children.forEach(c=>{if(c.geometry?.type==='ConeGeometry'&&c.material.emissive)c.material.emissiveIntensity=0.2+Math.sin(t*0.001+c.position.x)*0.15});
  const p=pt.geometry.attributes.position.array;for(let i=0;i<pc;i++){p[i*3+1]+=0.005*dt*60;if(p[i*3+1]>20)p[i*3+1]=0}pt.geometry.attributes.position.needsUpdate=true;
  econ.tick(dt);ctrl.update();ren.render(scene,camera);lr.render(scene,camera)}
anim(performance.now());addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);lr.setSize(innerWidth,innerHeight)});
chat('Crystal Drift - Post-Apocalyptic Mixed World','#88ff44');chat('Click ARENA to fight | SHOP for gear | AVATAR to customize','#88ff44');chat('WEAVE bridge online - GSK consciousness active','#00ffcc');
console.log('CRYSTAL DRIFT - World Weaver Cycle 1');
</script></body></html>
